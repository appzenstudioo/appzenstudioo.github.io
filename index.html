<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Zen Studio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#020617;
  color:white;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  top:0;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  z-index:1000;
}

/* HERO */
.hero{
  padding:100px 20px 50px;
  text-align:center;
  background:radial-gradient(circle at top,#3b82f6,#020617);
}

.hero h1{
  font-size:2.6rem;
}

.hero p{
  opacity:.8;
  margin-top:6px;
}

.stats{
  margin-top:10px;
  font-size:14px;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:18px;
  padding:14px 28px;
  border-radius:30px;
  background:linear-gradient(45deg,#3b82f6,#9333ea);
  color:white;
  text-decoration:none;
  font-weight:600;
  box-shadow:0 10px 25px rgba(59,130,246,0.5);
  transition:.3s;
}

.btn:hover{
  transform:translateY(-3px) scale(1.05);
}

/* SECONDARY */
.hero-buttons a{
  display:inline-block;
  margin:6px;
  padding:10px 18px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.3);
  color:white;
  text-decoration:none;
}

/* GRID */
section{
  padding:60px 20px;
  max-width:1100px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:22px;
  padding:20px;
  backdrop-filter:blur(15px);
  transition:.3s;
}

.card:hover{
  transform:translateY(-10px);
  box-shadow:0 25px 50px rgba(0,0,0,0.6);
}

/* PHONE */
.phone{
  width:260px;
  margin:auto;
  background:#000;
  border-radius:40px;
  padding:12px;
  position:relative;
  box-shadow:0 25px 60px rgba(0,0,0,0.7);
}

/* NOTCH */
.phone::before{
  content:"";
  position:absolute;
  top:8px;
  left:50%;
  transform:translateX(-50%);
  width:80px;
  height:15px;
  background:#111;
  border-radius:10px;
}

/* SCREEN */
.screen{
  height:480px;
  overflow:hidden;
  border-radius:25px;
  position:relative;
}

/* SLIDES */
.slides{
  display:flex;
  height:100%;
  transition:transform .4s ease;
}

.slide{
  min-width:100%;
}

.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* INSTALL */
.play{
  display:block;
  margin-top:15px;
  padding:14px;
  border-radius:30px;
  background:linear-gradient(45deg,#3b82f6,#9333ea);
  text-align:center;
  color:white;
  text-decoration:none;
  font-weight:600;
  box-shadow:0 10px 25px rgba(59,130,246,0.4);
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px;
  opacity:.7;
}

/* MOBILE */
@media(max-width:768px){
  .phone{
    width:220px;
  }
  .screen{
    height:400px;
  }
}
</style>
</head>

<body>

<nav>
  <b>App Zen Studio</b>
</nav>

<div class="hero">
  <h1>App Zen Studio</h1>
  <p>Simple • Premium • Reliable Android Apps</p>

  <div class="stats">
    ⭐ 700+ Users • 🚀 3 Apps • 🔒 Safe
  </div>

  <a href="#apps" class="btn">Explore Apps</a>

  <div class="hero-buttons">
    <a href="contact.html">Contact</a>
    <a href="privacy.html">Privacy</a>
  </div>
</div>

<section id="apps">
  <h2>Our Apps</h2>

  <div class="grid">

    <!-- APP CARD TEMPLATE -->
    <div class="card">
      <div class="phone">
        <div class="screen" id="slider1">
          <div class="slides">
            <div class="slide"><img src="images/wa1.png"></div>
            <div class="slide"><img src="images/wa2.png"></div>
            <div class="slide"><img src="images/wa3.png"></div>
            <div class="slide"><img src="images/wa4.png"></div>
            <div class="slide"><img src="images/wa5.png"></div>
            <div class="slide"><img src="images/wa6.png"></div>
            <div class="slide"><img src="images/wa7.png"></div>
            <div class="slide"><img src="images/wa8.png"></div>
          </div>
        </div>
      </div>
      <h3>WA Status Saver 2026</h3>
      <p>Save WhatsApp statuses instantly.</p>
      <a class="play" href="https://play.google.com/store/apps/details?id=com.appgenstudio.wa_status_saver_2026">Install</a>
    </div>

  </div>
</section>

<footer>
  © 2026 App Zen Studio
</footer>

<script>
function initSlider(id){
  const container = document.querySelector(`#${id} .slides`);
  let index = 0;
  let startX = 0;

  function update(){
    container.style.transform = `translateX(-${index * 100}%)`;
  }

  setInterval(()=>{
    index = (index + 1) % container.children.length;
    update();
  },2500);

  container.addEventListener("touchstart",(e)=>{
    startX = e.touches[0].clientX;
  });

  container.addEventListener("touchend",(e)=>{
    let diff = startX - e.changedTouches[0].clientX;

    if(diff > 50) index++;
    if(diff < -50) index--;

    if(index < 0) index = 0;
    if(index >= container.children.length) index = container.children.length-1;

    update();
  });
}

initSlider("slider1");
</script>

</body>
</html>
