<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Zen Studio</title>

<meta name="description" content="App Zen Studio - Premium Android Apps">

<script>
window.dataLayer = window.dataLayer || [];

gtag('config', 'G-XXXXXXX');

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
html{scroll-behavior:smooth;}
body{background:#020617;color:white;}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100%;
  background:#020617;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.loader-circle{
  width:40px;height:40px;
  border:4px solid #3b82f6;
  border-top:4px solid transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* NAV */
nav{
  position:fixed;
  width:100%;
  padding:15px 25px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  z-index:1000;
}

/* HERO */
.hero{
  padding:140px 20px 70px;
  text-align:center;
  background:radial-gradient(circle at top,#3b82f6,#020617);
}

.hero h1{
  font-size:2.5rem;
  animation:fadeUp 1s ease;
}
.hero p{
  opacity:.8;
  margin-top:6px;
  animation:fadeUp 1.2s ease;
}
.stats{
  margin-top:10px;
  font-size:14px;
  animation:fadeUp 1.4s ease;
}

.btn{
  display:inline-block;
  margin-top:25px;
  margin-bottom:20px;
  padding:14px 28px;
  border-radius:30px;
  background:linear-gradient(45deg,#3b82f6,#9333ea);
  color:white;
  text-decoration:none;
  font-weight:600;
  animation:fadeUp 1.6s ease;
}

/* BUTTON FIX */
.hero-buttons{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.hero-buttons a{
  padding:10px 20px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.3);
  color:white;
  text-decoration:none;
}

/* SECTION */
section{
  padding:60px 20px;
  max-width:1100px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:30px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  border-radius:20px;
  padding:20px;
  backdrop-filter:blur(15px);
  border:1px solid rgba(255,255,255,0.08);
  transition:.3s;
  animation:fadeUp 1s ease;
}

.card:hover{transform:translateY(-10px);}

.app-header{
  display:flex;
  align-items:center;
  gap:12px;
}

.app-icon{
  width:50px;height:50px;border-radius:12px;
}

/* PHONE */
.phone{
  width:240px;
  margin:15px auto;
  background:#000;
  border-radius:35px;
  padding:10px;
}

.screen{
  height:420px;
  overflow:hidden;
  border-radius:20px;
}

.slides{display:flex;}
.slide{min-width:100%;}
.slide img{width:100%;height:100%;object-fit:cover;}

/* CONTROLS */
.controls{
  display:flex;
  justify-content:center;
  gap:10px;
}

.control-btn{
  padding:6px 12px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
}

/* PLAY STORE CENTER */
.play{
  display:flex;
  justify-content:center;
  margin-top:15px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:40px;
  opacity:.7;
}

/* ANIMATION */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

@media(max-width:768px){
  .screen{height:360px;}
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-circle"></div>
</div>

<nav><b>App Zen Studio</b></nav>

<div class="hero">
  <h1>App Zen Studio</h1>
  <p>Simple • Premium • Reliable Android Apps</p>
  <div class="stats">⭐ 700+ Users • 🚀 3 Apps • 🔒 Safe</div>

  <a href="#apps" class="btn">Explore Apps</a>

  <div class="hero-buttons">
    <a href="contact.html">Contact</a>
    <a href="privacy.html">Privacy</a>
  </div>
</div>

<section id="apps">
<h2>Our Apps</h2>

<div class="grid">

<div class="card">
<div class="app-header">
<img src="wa_icon.png" class="app-icon">
<b>WA Status Saver 2026</b>
</div>

<div class="phone">
<div class="screen" id="slider1">
<div class="slides">
<img src="wa1.png">
<img src="wa2.png">
<img src="wa3.png">
</div>
</div>
</div>

<div class="controls">
<button onclick="prev('slider1')">◀</button>
<button onclick="next('slider1')">▶</button>
</div>

<div class="play">
<img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" width="140">
</div>
</div>

</div>
</section>

<footer>
© 2026 App Zen Studio<br>
<a href="contact.html">Contact</a> • 
<a href="privacy.html">Privacy Policy</a>
</footer>

<script>
// LOADER
window.onload = ()=>{document.getElementById("loader").style.display="none";};

// SLIDER
const sliders={};
function init(id){sliders[id]={index:0};}
function next(id){
let s=document.querySelector(`#${id} .slides`);
let t=s.children.length;
sliders[id].index=(sliders[id].index+1)%t;
s.style.transform=`translateX(-${sliders[id].index*100}%)`;
}
function prev(id){
let s=document.querySelector(`#${id} .slides`);
let t=s.children.length;
sliders[id].index=(sliders[id].index-1+t)%t;
s.style.transform=`translateX(-${sliders[id].index*100}%)`;
}
["slider1"].forEach(init);
</script>

</body>
</html>
